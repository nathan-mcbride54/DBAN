name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          # The live ISO links musl for both architectures; cross-check them so
          # target-specific issues (e.g. musl's c_int ioctl request type) are
          # caught here rather than in the ISO build.
          targets: x86_64-unknown-linux-musl, aarch64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Cross-check musl (x86_64)
        run: cargo clippy --workspace --target x86_64-unknown-linux-musl -- -D warnings
      - name: Cross-check musl (aarch64)
        run: cargo check --workspace --target aarch64-unknown-linux-musl

  iso:
    name: build ISO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build live ISO
        run: ./iso/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: dban.iso
          path: dist/dban.iso
          if-no-files-found: error
